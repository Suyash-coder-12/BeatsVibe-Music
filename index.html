<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeatsVibe Music App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container">
            <svg width="35" height="35" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00f2fe" />
                        <stop offset="100%" stop-color="#4facfe" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="45" fill="none" stroke="url(#brandGrad)" stroke-width="8"/>
                <path d="M35 65 L35 35 L50 50 L65 35 L65 65" stroke="url(#brandGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            BeatsVibe
        </div>
        <ul class="nav-links">
            <li class="active" onclick="switchTab('home')"><i class="fa-solid fa-house"></i> Home</li>
            <li onclick="switchTab('search')"><i class="fa-solid fa-magnifying-glass"></i> Search</li>
            <li onclick="switchTab('library')"><i class="fa-solid fa-book-open"></i> Your Library</li>
        </ul>
    </aside>

    <main class="main-container">
        <header class="topbar">
            <div class="search-bar" id="topSearchBar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search for artists, songs...">
            </div>
            <div class="auth-buttons">
                <button class="btn-signup">Sign up</button>
                <button class="btn-login">Log in</button>
            </div>
        </header>

        <div class="content">
            <div id="homeSection" class="tab-section active">
                <h2 id="sectionTitle">Top Results</h2>
                <div class="grid" id="resultsGrid"></div>
            </div>

            <div id="searchSection" class="tab-section">
                <h2>Browse Categories</h2>
                <div class="grid">
                    <div class="card category-card" style="background: linear-gradient(45deg, #ff5e3a, #f0094a);" onclick="triggerSearch('Pop Hits')"><h3>Pop</h3></div>
                    <div class="card category-card" style="background: linear-gradient(45deg, #4facfe, #00f2fe);" onclick="triggerSearch('Hip Hop')"><h3>Hip Hop</h3></div>
                    <div class="card category-card" style="background: linear-gradient(45deg, #b224ef, #7579ff);" onclick="triggerSearch('Lo-Fi Relax')"><h3>Lo-Fi</h3></div>
                    <div class="card category-card" style="background: linear-gradient(45deg, #0ba360, #3cba92);" onclick="triggerSearch('Bollywood')"><h3>Bollywood</h3></div>
                </div>
            </div>

            <div id="librarySection" class="tab-section">
                <h2>Your Downloaded Beats</h2>
                <div class="grid" id="libraryGrid"></div>
            </div>
        </div>
    </main>

    <div class="player" id="mainPlayer">
        <div class="player-left">
            <img id="currentCover" src="" alt="Cover">
            <div class="player-info">
                <div id="currentTitle" class="title">No vibe selected</div>
                <div id="currentArtist" class="artist"></div>
            </div>
        </div>
        
        <div class="player-center">
            <div class="player-controls">
                <i class="fa-solid fa-backward-step" onclick="playPrevious()"></i>
                <i class="fa-solid fa-play play-pause-btn" id="playPauseBtn" onclick="togglePlay()"></i>
                <i class="fa-solid fa-forward-step" onclick="playNext()"></i>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div class="player-right">
            <div class="volume-container">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
            </div>
            <i class="fa-solid fa-download download-btn" onclick="downloadCurrentSong()" title="Download"></i>
            <i class="fa-solid fa-expand expand-btn" id="expandBtn" onclick="toggleFullScreen()" title="Full Screen"></i>
        </div>
    </div>

    <nav class="mobile-nav">
        <div class="mobile-nav-item active" onclick="switchTab('home')"><i class="fa-solid fa-house"></i></div>
        <div class="mobile-nav-item" onclick="switchTab('search')"><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="mobile-nav-item" onclick="switchTab('library')"><i class="fa-solid fa-book-open"></i></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
